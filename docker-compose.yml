version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: hospital-api-db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hospital-network

  migrate:
    image: migrate/migrate
    depends_on:
      - postgres
    entrypoint: ["migrate"]
    networks:
      - hospital-network
    volumes:
      - ./migrations:/migrations

networks:
  hospital-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
